<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Timetables</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f9ff;
      min-height:100vh;
      padding:40px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .header h1{
      color:#007bff;
      font-size:28px;
    }

    .back-btn{
      padding:10px 18px;
      background:#007bff;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .back-btn:hover{
      background:#0056b3;
    }

    .timetable-box{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 3px 12px rgba(0,0,0,0.1);
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:800px;
    }

    th, td{
      border:1px solid #ddd;
      padding:12px;
      text-align:center;
    }

    th{
      background:#007bff;
      color:white;
      font-size:16px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>📅 My Timetables</h1>

    <button class="back-btn" onclick="window.location.href='student_dashboard.html'">
      ← Back
    </button>
  </div>

  <div class="timetable-box">
    <table id="timetable-table">
      <thead>
        <tr>
          <th>Time</th>
          <th>Monday</th>
          <th>Tuesday</th>
          <th>Wednesday</th>
          <th>Thursday</th>
          <th>Friday</th>
          <th>Saturday</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="7">Loading timetable...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ✅ Timetable still loads through SAME JS file -->
  <script src="student_dashboard.js"></script>

</body>
</html>
