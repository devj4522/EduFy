<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - EduFy</title>
  <link rel="stylesheet" href="admin_dashboard.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <img src="images/Edufy.png" alt="EduFy Logo">
    </div>
    <nav>
      <button onclick="showPage('dashboard')">📊 Dashboard</button>
      <button onclick="showPage('students')">👩‍🎓 Students</button>
      <button onclick="showPage('teachers')">👨‍🏫 Teachers</button>
      <button onclick="showPage('settings')">⚙️ Settings</button>
      <button onclick="window.location.href='login.html'">🚪 Logout</button>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <header>
      <h1>Welcome, Admin</h1>
    </header>

    <section id="dashboard" class="page active">
      <div class="cards">
        <div class="card">
          <h3>Total Students</h3>
          <p>120</p>
        </div>
        <div class="card">
          <h3>Total Teachers</h3>
          <p>15</p>
        </div>
        <div class="card">
          <h3>Pending Reports</h3>
          <p>5</p>
        </div>
      </div>
    </section>

    <section id="students" class="page">
      <h2>Manage Students</h2>
      <p>Here you can add, edit, or remove students.</p>
    </section>

    <section id="teachers" class="page">
      <h2>Manage Teachers</h2>
      <p>Here you can add, edit, or remove teachers.</p>
    </section>

    <section id="settings" class="page">
      <h2>System Settings</h2>
      <p>Configure system preferences here.</p>
    </section>
  </div>

  <script>
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }
  </script>
</body>
</html>
